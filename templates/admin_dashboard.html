<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.navbar{
background:#111;
}

.card{
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

.stat{
font-size:30px;
font-weight:bold;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">

<span class="navbar-brand">Admin Dashboard</span>

<div>
<a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

</div>
</nav>


<div class="container mt-5">

<div class="row g-4">

<div class="col-md-3">
<div class="card p-4 text-center">
<h5>Total Users</h5>
<div class="stat text-primary">{{users}}</div>
</div>
</div>

<div class="col-md-3">
<div class="card p-4 text-center">
<h5>Total Auctions</h5>
<div class="stat text-success">{{auctions}}</div>
</div>
</div>

<div class="col-md-3">
<div class="card p-4 text-center">
<h5>Total Bids</h5>
<div class="stat text-warning">{{bids}}</div>
</div>
</div>

<div class="col-md-3">
<div class="card p-4 text-center">
<h5>Suspicious Activity</h5>
<div class="stat text-danger">{{suspicious}}</div>
</div>
</div>

</div>

</div>

</body>
</html>
