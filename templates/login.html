<!DOCTYPE html>
<html>
<head>

<title>User Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(120deg,#1d4350,#a43931);
height:100vh;
font-family: Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:400px;
padding:30px;
background:rgba(255,255,255,0.1);
border-radius:15px;
backdrop-filter: blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.login-title{
text-align:center;
margin-bottom:20px;
font-weight:bold;
}

input{
margin-bottom:15px;
}

.btn-login{
width:100%;
}

.register-link{
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="login-title">Login to Auction System</h3>

<form method="POST" action="/login">

<input 
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>

<input 
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

<button class="btn btn-success btn-login">

Login

</button>

</form>

<div class="register-link">

<a href="/register" class="text-white">

Don't have an account? Register

</a>

</div>

</div>

</body>
</html>
